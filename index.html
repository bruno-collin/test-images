<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie d'images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .image-container {
            text-align: center;
        }
        .medium-image {
            max-width: 300px;
            max-height: 300px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .large-image {
            max-width: 90vw;
            max-height: 90vh;
            cursor: pointer;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 5px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img
            !src="https://via.placeholder.com/300"
            src="images-toile/toile-001.jpg"
            alt="Exemple d'image"
            class="medium-image"
            id="image"
        />
    </div>
    <div class="overlay" id="overlay"></div>

    <script>
        const image = document.getElementById('image');
        const overlay = document.getElementById('overlay');

        image.addEventListener('click', function() {
            if (image.classList.contains('medium-image')) {
                image.classList.remove('medium-image');
                image.classList.add('large-image');
                overlay.style.display = 'block';
            } else {
                image.classList.remove('large-image');
                image.classList.add('medium-image');
                overlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
